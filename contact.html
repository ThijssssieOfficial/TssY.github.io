<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | TssY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-form-container {
      max-width: 800px;
      margin: 150px auto;
      padding: 60px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      position: relative;
    }
    .contact-form-container::before {
      content: 'DIRECT MESSAGE';
      position: absolute;
      top: 20px;
      left: 20px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 5px;
      color: var(--accent-color);
      opacity: 0.5;
    }
    .form-group {
      margin-bottom: 30px;
    }
    .form-group label {
      display: block;
      font-family: var(--font-display);
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: var(--text-secondary);
    }
    .form-group input, .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      padding: 15px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: var(--transition);
      outline: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent-color);
      background: rgba(255,255,255,0.05);
    }
    .form-group textarea {
      height: 150px;
      resize: vertical;
    }
    .submit-btn {
      width: 100%;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="background-moon"></div>

  <a href="index.html" class="menu-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">←</a>

  <div class="contact-form-container reveal visible">
    <h2><span class="brush-accent">Contact</span></h2>
    <form action="https://formspree.io/thijssssie123@gmail.com" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="YOUR NAME" required>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="PROJECT TYPE" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="TELL ME ABOUT YOUR PROJECT" required></textarea>
      </div>
      <button type="submit" class="btn primary submit-btn">Send Message</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
